body:
  text: 四明石芝沙門宗曉編所傳莫越乎道能弘必藉乎人不為有人而存不為無人而亡道固常自若也然不得其人而弘之則道奚益於生靈哉惟得人以弘其道不絶則此道昭著若日月嗣照於無窮者也寶雲義通法師本高麗君族樂道厭世從佛剃落首傳華嚴起信衆已悅隨洎壯越滄溟來中國初訪雲居契悟南宗重念台衡教觀經五代離亂僅存一線遂挺志造螺溪寂公之室頓受其傳具體之學聲聞四方已而誓返本國敷揚法化因挈錫附舶四明偶郡守淮海大王錢公惟治請問心要辟為戒師自是緇白傾嚮固留演法會漕使顧公承徽捨宅創寺命師開山龍象雲會講貫二紀遂以大法付法智禮公是曰四明尊者焉法智主延慶幾四十年此道遂大振於天下茲非所謂得傳弘之人而致然乎宗曉比乘夙志編縷四明遺文再惟寶雲鼻祖與吾四明為賢父子表裏像運中興一家若其德業不傳於世則教失宗元後昆奚究因考核實洎諸簡編得師事迹與厥後繼之者凡二十篇別為一帙詺題寶雲振祖集蓋取是院祖堂之扁曰振祖故也覽斯文者當知吾祖遺德之美不可以采托人微而見棄焉嘉泰癸亥仲春清旦比丘宗曉敬序目録請勑額奏文省牒勑黃使帖四明圖經紀造院事迹台州螺溪定慧院淨光法師傳附行巨宋明州寶雲通公法師石塔記寶雲通法師移塔記草菴紀通法師舍利事紀通法師著述遺迹寶雲通法師真贊詩寄贈寶雲通公法師明州寶雲四祖師贊寶雲通公教主真贊寶雲始祖通公法師真贊寶雲開山通法師忌疏南湖師祖寶雲尊者齋忌疏四明法師稟學寶雲尊者慈雲懺主稟學寶雲住持明智法師寶雲住持史太師請瑩講師住寶雲疏寶雲院利益長生庫記建法堂慶筵致語法雨堂題名請勑額奏文明州傳教院臣僧延德右輒具丹誠上干天聽退量踰僣頓抱憂惶切念臣師授和尚傳天台教僧義通所住當院是開寶元年得福州前轉運使顧承微經淮海大王申請入院住持為國長講天台教聽徒六十餘衆院宇一百來間統衆安居二時供應雖蓮臺登陟宣揚久贊於皇風且華社莊嚴輝煥未霑於勑額恭惟皇帝陛下應天撫運執禮臨朝萬而盡被無私四海而咸歌有道臣叨逢聖代幸預真徒是敢遠詣明廷仰祈寵錫伏乞俯回督造特降勑命指揮賜臣當院真額圖記所冀天恩顯授梵剎遐傳俾光佛法之門永贊成平之化干犯宸聽臣無任瞻天荷聖激切屏營之至謹進狀奏聞伏聽聖旨太平興國六年十二月日明州傳教院臣僧延德狀奏省牒中書門下牒明州傳教院僧延德乞改院額事牒奉勑宜令明州分折本院見在殿宇房廊功德佛像住持僧人數目并起置年代疾速聞奏牒至準勑故牒太平興國六年十二月二十四日牒中書侍郎兼兵部尚書平章事盧押左僕射兼門下侍郎平章事押司徒兼侍中押勑黃中書門下牒明州明州奏準勑分析到傳教院見在殿宇房廊一百餘間佛像七十事主客僧五十八人開寶元年置建奏聞事牒奉勑宜賜寶雲禪院為額牒至準勑故牒太平興國七年四月日牒中書舍人參知政事郭押左諫議大夫參知政事竇押左僕射兼門下侍郎平章事押司徒兼侍中押權知軍州事趙易知通判軍州事周頻使帖州帖傳教院今月五日準勑黃明州奏準勑分析到傳教院見在殿宇房廊一百餘間佛像七十事主客僧五十八人開寶元年置建奏聞事牒奉勑宜賜寶雲禪院為額者右具如前已帖僧正司知委訖事須帖本院仰準勑命指揮太平興國七年六月七日押司張某守司法權録事參軍事祝押通判軍州事周押權知軍州事趙押建炎庚戌春遭兵火院宇一夕而空聖朝所賜勑黃石刻於煨燼中文字斷裂已不可辨常慨以無復再全之理者逮紹興己巳距庚戌凡二十載一日忽有姚江僧持此墨本來仲旻欣然如獲重寶意必先祖通法師教席餘澤未已使有天興之幸不然何符契如此之非常耶越明年正月戊子再摹于石前管內僧正住持真教大師仲旻書四明圖經紀院事迹寶雲教院在縣西南二里舊號傳教院皇朝開寶元年建大平興國七年改賜今額本漕使顧承徽捨宅為法師義通傳教處乞額寶雲昭其祥也義通字惟遠本高麗君族自三韓來譽振中國知禮遵式子襟是其門人之上足逾二紀右脅而逝既茶毗弟子收骨藏于育王山之陽纍石為塔有記待制王公伯庠書其後併刻于石台州螺溪淨光法師傳此傳見大宋僧傳今附此刊行師諱義寂字常照姓胡氏溫州永嘉人也母初懷娠不喜葷血生乃以紫帽蒙其首焉幼啓二親堅求去俗旋入開元蘭若投師授法華經期月而徹寺之耆老莫不稱嘆希有既而祝髮受具已往會稽學南山宗既通律藏乃造天台山研竅止觀其所易解猶河南一遍照也先是天台智者教迹遠則安祿兵殘近則會昌焚毀殘編斷簡本折枝摧傳者何憑以正其學師於是每思鳩集因適金華古藏中得淨名疏而已後時忠懿王以教相咨問德韶國師師指授尊者因是奏王請出金門建講欽若敬奉為之造寺今螺溪定慧院是也王又遣十人往日本國取天台教藏回賜師以淨光大師之號追諡九祖名銜皆師之力焉由是一家教乘以師為重興之人矣而韶公適與智者同姓能毗贊吾宗又居佛隴之側疑其後身也微師此宗學者幾握半珠為家寶歟太平興國五年從山入州治寺寺東樓安置樓近大山夜夢剎柱陷沒于地意頗惡之自徙於西偏僧房其夜春雨驟甚山崩樓圮人咸謂師先見乃證報得天眼焉續受黃巖人請乘舟泛江放生講金光流水至海門靈石寺是智者所居道場因勸人修茸造像入緣者繁多時今上遣高品衛紹欽入山建壽昌寺衆官同命受戒又雍熙初永安縣敦請於光明寺受戒忽古殿佛像隳腹中獲發願文即唐咸通六年僧希皎為七鄉人施戒勸造此像願捨報為男子童真出家常布衲傳法利生觀者皆意寂之前身也至四年十月寢疾仲冬四日囑誡門人不許哭泣祭奠等事言已瞑目而終壽六十九法臘五十傳法弟子百餘人外國十僧其義通實高者也如澄或寶翔皆亞焉是時台之民宦曾預傳戒者共迎師真相於開元寺盡誠祭供皆縞素哀泣天為之變慘太守鄭元龜作詩悲悼歸空方文樹塔志之厥後徒屬遷葬他所開塔顏貌如生髮長餘寸平素講法華經並玄義二十遍止觀維摩光明梵網金剛錍法界觀禪源詮永嘉集各數遍述義例不二門等科節數卷然自智者六代傳法荊溪之後二百餘年寂受遺寄克深負荷況於炎月講説曾無流汗沾洽其不久聽而勝解佛乘每一宣揚則摐金應玉召羽和商較乎九旬談妙相去何若又嘗寓四明育王寺夢登國清上方有寶莊嚴幢座題曰文殊臺設枑梐欄隔求入無由俄睹觀音菩薩從堂徐出以手攘却行馬𮞍相接斯須覺己與觀音身泯合不分因而驚寤自爾之來樂説無盡矣或謂入普門智乘上合佛覺證無上故下合衆生凡同體故開則羣靈混成一法矣得是心者非觀音而誰歟大哉師之解行若是可不為世之楷謨乎巨宋明州寶雲通公法師石塔記住延慶法孫文慧大師宗正撰法師諱義通字惟遠德業詳諸行狀本海國高麗君族尹姓母孰氏妊誕頗異因捨龜山院師釋宗及冠染具傳華嚴起信彼尤仰止殆壯遊中國晉天福時也至始訪雲居契悟嗣謁螺溪寂師了天台宗繄道且逢源具體之聲浹聞四遠姑曰圓頓之學畢茲轍矣吾欲以此導諸未聞必生地始乃括囊東下道由四明太師錢公惟治問以心要洊辟為戒師繼此道俗蘄嚮請留依怙師曰非始心也公曰或尼之或使之非弟子之力也如曰利生何必雞林乎緣既汝合辭不我却因止焉會漕使顧承徽捨宅為傳道處第乞額寶雲昭其祥也既而日揚教觀逾二祀知禮遵式子矜之高者其餘升堂及門莫可勝紀凡諸著述並逸而不傳嗟夫君子曰天台之道勃然中興師之力也俗壽六十有二端拱改元龍集戊子十月十有八日示疾越三日左脅而逝既茶毗門弟子收骨藏于育王山之陽寺西北隅禮也後七十有七載甓甃已蕪乃就之纍之為方墳增顯其處爾時皇宋五葉歲在甲辰天王即位之明年改元治平之暮春十日重法孫宗正記右通法師石塔記紹興歲在庚辰十月二十一日嗣法住持智謙之所重立也通公來自三韓譽振中國住寶雲凡二紀餘實第一代如法智慈雲乃其高第天台之教中隳而興繄師之力而一時事迹行業等石刻今不復存謙公力搜訪之始得塔記乃再刊刻又闢真堂塑師坐像及吳越國王所贊頂相併上石碣除阿育王山烏石塔所屋之以石以表示後世於是通師之道益以昭著時謙之來才半歲餘爾寶雲自通始建傳二百載比年頽圮特甚謙睹之慨然支傾飭蠧浸復其舊亦可謂不負祖師付囑荷擔之意矣聖宋天寶間漕使顧承徽捨其第以處於師其後推官陳雲者又捨西嶼之田四百三十畝歲久不復知謙亦塑二公像而表出之人益重其知本謙得法於延慶第五代明智師其淵源亦有所自云左朝散郎主管台州崇道觀王伯庠謹書寶雲通法師移塔記住臨安府靈隱山月堂道昌撰余住育王時寶雲威法師相訪因語通法師乃寶雲啓教之宗主也有塔葬此山余詢勤舊皆云在寺西隅遂往尋之見荒臻蓬棘中塔已隳毀矣是時烏石有山僉云風水甚佳貴人富家數來求之余以常住地非余私有若自與之必招因果也其間人情有大不悅者而余獨守之如初是時先師妙湛老人居西塔因以稟之先師云通法師天台宗主也又此地人皆欲得之若遷通公骨殖葬於此地則非獨免求地者源源而來抑亦通公之骨葬得其所余遂從先師之言擇日同威師并妙湛老人集衆遷葬之至取其骨香水洗沐於日光中世所謂堅固子者或青或黃或紅或曰滋生於骨上見者無不歡喜作禮贊嘆如是殊勝世所未有後育王住持人遷寂其徒知此地之勝而欲邀其福就彼葬之未久而皆為人所移唯通師之塔巍然而獨存是知用心之善不善者報應之效曉然可見也紹興二十八年戊寅歲八月二十八日延慶若權上人訪余於冷泉出通師重建石塔記欲求余書遷葬之因故特以此示之云住靈隱山月堂比丘道昌謹題草菴紀通法師舍利事四明寶雲通法師新羅人也得法於天台螺溪既入滅骨塔於阿育王山門徑之左積有年矣後因別改寺門此地蕪沒塔亦隨壞宣和丁未冬今蔣山昌禪師主育王徙其骨塔於烏石山是時大衆半千同送之今雪峰睿禪師寶雲威法師亦預焉其骨晶熒可愛考之琅琅有聲雪峯默念之果若人骨也當不止如是而已少頃杲日既升見骨中世所謂堅固子者二三衆驚且譁則須臾變數百千熣燦的皪瑟瑟如珠璣人或求之至有盈掬得之者余紹興辛亥閣錫於廣利禪人多以此語余余尚疑之續至烏石禮法師之塔菴有老僧曰某者能道其事果然又曰老僧嘗求二顆置掌中握之移刻開示之已滋七八矣余始信之此老僧非妄語者然法師生有奇表昔吳越國王尤所欽重嘗贊之有曰白毫異相滿月奇姿千里同風瞻之仰之又詩曰平生賴慈眼南望一咨嗟當是時台道既微賴師持之授法智慈雲以起家焉此所謂台宗之命脈也紀通法師著述遺迹天台正傳止荊溪禪師為九世祖然自荊溪後之傳者亦復不絶焉雖定慧雙弘未可並肩九祖然截瓊枝析栴檀則皆行天台之道者也今寶雲通公實繼荊溪之後復得法智慈雲分化於江浙此道遂再振矣師解行高深洪通甚力準石塔記師所著述並逸而不傳然考諸四明章記則嘗秉筆觀經疏記光明玄贊釋若餘之法義則法智悉面承載之於記鈔其贊釋一部尚存但不廣傳耳惜哉師所建院宇已二百二十二年兵塵之後古迹掃地而盡嘗訙諸耆宿知師有藏衣塔一所存景清興法院遂訪之果奉安懺殿尊像前雕布奇巧飾以渾金內空外方高五尺許此寶寶雲舊物不知何緣留墜彼剎萬一合浦珠還豈不為山家傳持之標幟乎寶雲通公法師真贊吳越國王錢俶不離三界生我大師白毫異相滿月奇姿戒珠普照慧海無涯人天福聚瞻之仰之寶雲法師乃四明天竺所稟則中興教觀之鼻祖也而古無塑像不亦殆於忘本乎智謙既立坐像復圖是本併錢王贊摹刻諸石俾瞻拜者可以想見當時之形容云紹興庚辰孟冬第六代住持法孫圓澄大師智謙謹題詩寄贈四明寶雲通法師吳越國王錢俶海角復天涯形分道不賖燈青讀圓覺香暖頂袈裟戒比珠無纇心猶鏡斷瑕平生賴慈眼南望一咨嗟其一相望幾千里曠然違道情自茲成乍別疑是隔浮生得旨探玄寂無心競利名茆齋正秋夜誰伴誦經聲其二宗曉嘗閲草菴教苑遺事得所謂平生賴慈眼南望一咨嗟之句蓋昔吳越國忠懿王寄贈寶雲通法師所作也惜乎不睹其全每以為恨一日訪舊得之喜不自勝荊玉隋珠曾未足喻抑有以見古人不以勢位為間而道眼相照於天人之際有如此者是必靈山同佛付囑故一以忠烈輔世一以願力洪法雖世出世殊而澤及後昆至於無窮其揆一也宗曉以晚生幸霑慈蔭祖宗盛事其可弗傳敬以所贈二章登諸琬琰用補茲山故事云嘉泰壬戌歲中秋石芝比丘宗曉謹識明州寶雲四祖師贊會稽郡王文惠公史浩天台智者禪師庖犧畫易朕兆太極一陰一陽已墮形迹瞿曇説法身心泯寂三止三觀忽漏消息箇中至妙杳冥昏默何假言詮焉庸訓釋猗歟智者生稟岐嶷八彩重瞳人固莫識南嶽一見頓明宿昔悟施陀羅既非他得云胡止觀紛紛藉藉蓋以慈緣憫世迷惑作是筌如援嫂溺豈期後學紙上尋覔文字猥繁道益薄蝕精義入神蟬蛻筆墨不離當處靈山一席師之本願於是乎塞祠宇巋然遺容殊特凡百君子過之必式寶雲通公法師止觀宗旨鼎盛于隋末法不競將遂堙微通師崛起三韓之湄風帆萬里捨筏從師得道已竟言歸有期四明檀越顧氏承徽捐宅為寺盡禮邀祈名曰寶雲金剎巍巍師既戾止學徒影隨戶外屨滿聲走天涯台山墜緒接統興衰有二神足真師子兒慈雲法智迭和塤篪人皆謂師蟠英孕奇植根堅固獨幹䨥枝華開五葉異轍同歸抵今禪教遂得並馳續佛壽命師其以之四明法智尊者靈山之會龍象雲蒸羊鹿牛車同歸一乘雨勝法雨普潤有情逮及後世止觀爰興慈鋒慧劒摧墮疑城誰其嗣之有四明講席雄峙淵默雷聲天台正統於焉繼承章聖在御使馹馳星問佛大旨得其精英宸恩載錫法智鴻名是為釋子萬古光榮天竺慈雲法師英英式師文中之虎口角珠璣筆端繡組王侯欽承聖君眷與慈雲錫號天竺是處法智為兄通公為父濟濟一門龍掀鳳翥積功纍行知幾寒暑四衆仰止如子依母梵音洋洋周浹寰宇凡曰禮文悉由纂敘普賢願力金手摩撫盡未來際作懺悔主寶雲古道場宗瑩以固陋承之大傅大丞相魏國公適幸臨之首訪祖師遺趾一龕風雨智者寶雲二大士像頽然其中公指寶雲顧謂宗瑩曰法智慈雲二尊者得非此老親出乎至今人目為通師翁道場蓋為二弟子設也可闢一堂塑繪四祖師像作新斯剎宗瑩悚然有愧王臣護法之意遂即東廡作振祖堂堂成像設亦具衆請魏公作贊公不墮知見不涉思惟四贊立成大以發明吾祖骨體亦足以開四方觀聽之益宗瑩既揭之扁榜復鑱諸堅石補寶雲既𨶏之典為吾宗無盡之傳淳熙十四年四月旦寶雲教院住持傳天台教觀宗瑩謹識寶雲通公教主真贊住阿育王山野堂普宗稽首豁大千戶牖識虗空面目不容正視聊以旁矚一時華現於優曇萬里香飄於瞻蔔以截流辨卷學海之鯨濤以徹法眼轉義天之雙轂見法界性入螺溪門是知遇白牛而難駕注黃金而易昏闢三觀之祕楗操凡聖之宏略通玄峯頂何巍巍淮海清風振寥廓寶雲始祖通公法師真贊住南湖竹菴比丘可觀稽首呼一切人皆是鄉人吟雲掃電枯木生春決定願力再來歸命天台後身寶雲開山通法師忌疏草菴道因右伏以道無今古學有宗承一滴分流千車共轍功勳莫大中興知自於根源授受非常正教弘傳於師弟先推嫡嗣法智慈雲而間生欽仰師翁道德形儀而如在恭惟傳持教觀寶雲大尊者台崖的派鷲嶺耿光分為不盡之明燈散作無方之法雨垂形海國化迹神洲真慈隱妙德之身夢幻應苾芻之像流芳甬水一家之至教重輝大備鄞江二字之敷宣烈焰白毫異相檀那已播於伽陀烏石殊方窣睹競分於室利某等叨逢勝化獲睹肖容但有翹勤徒增悁結今則孟冬屆候諱日斯臨傾誠聊備於蘋蘩匪薄少伸於追遠伏乞我祖享我羞無羞之供示我來不來之儀憑茲微妙之緣咸以中和之氣則使民康物阜時和歲豐醍醐上味而處處灌神白牛大車則人人脂軸一家令轍四海同遵情與非情咸歸祕藏但某無任拜手歸依之至謹疏南湖師祖寶雲尊者齋忌疏鏡上義銛右伏以法源自遠注剎海以周流慧日方中映寶雲而下飾羣機煥發此道光嚴式臨示滅之辰敢怠如生之敬恭惟中興敬觀寶雲尊者大法師應身日本命世山家視一切人皆若同鄉大方無外出兩高第咸於實地遊刃有餘疏正派於螺溪散真風於象扇某等仰高彌甚向若茫然玉几橫經恨不與當時之聽衆尼壇下拜愧濫稱今日之孫謀庶憑明信之熏幾展慈憐之鑒伏願無生智焰永聯從上之光常住妙華益粲後來之秀盡空末學同趣圓乘謹疏昔鄮峯未更為禪剎大洪天台教觀清涼大法眼禪師亦稟教於中時寶雲通公蓋嘗預講其四明慈雲皆為聽衆其説見于鄮峯古碣所謂玉凡峯者今阿育王山是也四明法師稟學寶雲尊者吾祖法智興起大教始者二十歲參學寶雲法師登門方三日座元謂之曰法界自有次第若當尋之師曰何謂法界座曰大總相法門圓融無礙者是也師曰既圓融無礙何有次第座無對居一月自講心經人皆駭聽及二年厥父偶夢師跪于通公之前通執瓶水注其口自是一家教觀頓然超悟因代通講授僅數載洎通之滅又自夢穿通之首擐于左臂而行自謂二夢初表受習流通次表操持種智自後遷住乾符四載方赴南湖之請也慈雲懺主稟學寶雲住持慈雲法師台之寧海人也脫素于東掖山洎為僧即入國清普賢像前燼指誓學天台聖教徐負笈趍于寶雲道中忽夢一僧自言吾是文殊和尚及至禮通之足㥥自省所夢之僧即師也因爾服膺受道值通歸寂乃返天台淳化改元師年二十八衆請住寶雲凡十二載講四大部經咸平五年復還東山晚遷天竺大闡法化棲遁終焉師居寶雲靈迹有四一師於寶雲講經次一旦忽有施氏胎驢趍伏座下講罷而去自爾而至者凡四十日産而乃已驢果有人之意而能聽法不亦異乎哉二師在寶雲嘗建淨土會著書曰誓生西方記作念佛三昧詩其敘曰念佛三昧踐聖之妙道凡揭厲于法流者何莫由斯矣昔遠公化尋陽羣賢皆為念佛三昧詩遠為序皇宋丙申遵式會四明高尚之賓百餘人春冬二仲一日一夜萃寶雲講堂想無量覺行漢魏經壬寅既廢適台之東山惜無述焉乃擬普賢作詩寄題于石垂於後世也三師住寶雲自幸得觀音幽贊命匠造旃檀大悲像像成工有誤折手執楊枝師驚且恐即自接之不施膠添而泯合如故即撰一十四願文其略曰己亥咸平二年四月四明沙門遵式刻像懼晦于後世手題記云沈淨月刻相貌章淨修等須像財物像成立于大法堂召僧百人奉行經法而證之四咸平三年四明大旱郡人資以祈雨法師用請觀音三昧冥約三日不雨當自焚如期果大霈郡守蘇為異而敬之即題石為記明智法師寶雲住持朝説之作師行業記曰明智中立師明之鄞人也元祐間住延慶一日辭去雖太守亦不得而留也且曰待余六十歲再來自是居隱學山衆方從之會缺僧職復不能捨太守躬請出住寶雲實其祖師通公道場時寶雲頽圮無一全椽師復新之咸曰師前曰隆其三世祖之居今又興其四世祖之室孰謂像法末哉先是伽藍神腹中得願文一紙曰後更百年有肉身菩薩重興此地師復退去築菴白雲山凡四年亦無一日不講太守又命住延慶不得辭時年六十歲果符前言矣草菴教苑餘事載明智住寶雲經于八年史太師請瑩講師住寶雲疏右伏以昔寶雲有大弟子如渥窪出䨥馬駒自天台熏正見知若猗蘭脫衆蕭艾當後世寂寥之際如阿師付授之難共惟新命寶雲瑩公講師既以心傳不為塵纍偏歷雨華之肆親出烹金之爐鶴髮霜眉受道人卒歲之託晨香夕火致居士華封之誠衆所歸依公無退轉謹疏寶雲院利益長生庫記祖師自雞林來首訪螺溪盡得天台之道復欲杭海太守錢公固留之使者顧公亦舍其室為師傳道授業之所故法智慈雲二大士從是出焉今寶雲之居人目為通師翁道場是也其間廢興相襲不得而詳住持瑩公坐庿未溫首斂巾盂以估於衆得錢一百萬內外道俗又得錢百萬太師魏國史公捐國夫人簪珥以施之合為利益長生庫以備歲時土木鐘鼓無窮之須後五年建大講堂半取其羸以助工役實其志也瑩公性淳直而御衆以寬寶雲初歸有侈心者輒起重輕之議至有僧吏恃權以橈之權虎而寇傍人為震栗而瑩自若也太師魏公實知之至是則人皆悅服余聞先佛捐軀以求道無一芥子許地空無佛身至空劫積塵之初所謂草樹巖崖成道利生之所率先成就此豈智術所能致哉今寶雲虜焰之餘才一甲子則氣象復還舊觀此瑩之心與昔人願轂俱馳而不忘也後世因循苟且之事瑩恥而不為如石之堅如地之載其所植立如此故余不得不書瑩嗣東堂元慧師瑩公名宗瑩云紹熙三年七月旦日橘洲老衲寶曇記建法堂慶筵致語同前右伏以梵宮成列無越寶雲之故家人至今知有雞林之古佛實斯文之冀北震大聲於斗南自劫灰之後而樹王先成歷國朝以來而人物尤盛譬諸琵琶琴瑟必資妙指乃發至音於草木叢林雖曰無情亦知所嚮侈一堂之壯觀閲數世之宏規螮蝀翬飛欲上于於雲漢迦陵清徹將遍滿於人寰恭惟寶雲堂上大法師塵外孤蹤林間老斫接龍象之步武繼鐘梵於晨昏輪奐一新咄嗟兩辦朱明在候方鼓吹於薰風緇白臨筵共徘徊於華雨檀越某人高情落落和氣融融肯同蓮社之清遊是亦靈山之勝友某等獲觀殊勝辱在伶倫不揆蕪才輒陳口號又見南風入舜弦幾多龍象正差肩一堂絶出雲霄上萬口齊稱古佛先坐穩掜床如大定手揮麈尾極重玄𨟊山鄞水人長在總是吾廬不計年法雨堂題名紹熙辛亥歲住山瑩講師建大法堂廣袤宏曠殆甲諸方是時竹院禪師曇公謁是院因請立名師應聲曰院額寶雲雲能致雨雨能潤物茲院乃台宗中興發源處佛祖雨法雨沃羣生非一日當以法雨為堂之名宜矣宗曉深愛此名因依而山門未暇揭是榜恐久而堙沒特表而出之經不云乎慈意妙大雲澍甘露法雨又曰無上法雨雨汝身田又曰能雨無上甘露法雨法雨之名遍出諸大乘經今吾祖通公大法師負高明之識來自三韓得淨光法道殆於此地洪通四明天竺二尊者蟠英蓄秀能荷傳斯宗迄今垂二百載其道未艾此非雨法雨沃羣生乎昔楊無為嘗贊宗門陳尊宿曰叢林處處蒙霑潤莫測風雷起老龍今於寶雲通公亦云也
